version: '3'
services:
  mongo:
    image: mongo:3.2
    volumes:
      - ./db/mongo:/data/db
  app:
    build: app
    command: 'python baby-learning/server/main.py'
    volumes:
      - ./:/project
      - ~/.ssh:/home/dev/.ssh
      - ~/.gitconfig:/home/dev/.gitconfig
      - .zsh_history:/home/dev/.zsh_history
    ports:
      # tensorboard
      - 7800
      # flask
      - 7000
    links:
      - mongo
